<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freely — Listening</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-user-select: none;
      user-select: none;
    }

    .overlay {
      width: 100vw;
      height: 100vh;
      background: rgba(30, 30, 30, 0.8);
      border-radius: 18px;
      border: 0.5px solid #2e2e2e;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 0.5px solid #2a2a2a;
      cursor: grab;
      -webkit-app-region: drag;
    }

    .titlebar-right {
      -webkit-app-region: no-drag;
    }

    .resize-handle {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 16px;
      height: 16px;
      cursor: se-resize;
      z-index: 10;
    }

    .resize-handle::after {
      content: '';
      position: absolute;
      right: 3px;
      bottom: 3px;
      width: 8px;
      height: 8px;
      border-right: 2px solid #555;
      border-bottom: 2px solid #555;
    }

    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .titlebar-left span {
      color: #e8e8e8;
      font-size: 15px;
      font-weight: 500;
    }

    .titlebar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .titlebar-right button {
      background: none;
      border: none;
      cursor: pointer;
      color: #555;
      font-size: 16px;
      line-height: 1;
      padding: 2px 5px;
      transition: color 0.15s;
    }

    .titlebar-right button:hover { color: #aaa; }

    .body {
      flex: 1;
      padding: 28px 26px 32px;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .body::-webkit-scrollbar { display: none; }

    /* Waveform row */
    .waveform-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #E8A44A;
      flex-shrink: 0;
    }

    #waveform {
      display: block;
      flex-shrink: 0;
    }

    .listening-label {
      text-align: center;
      color: #E8A44A;
      font-size: 14px;
      letter-spacing: 0.02em;
      margin-bottom: 24px;
    }

    /* Transcript */
    .divider {
      border: none;
      border-top: 0.5px solid #2a2a2a;
      margin-bottom: 20px;
    }

    .transcript-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 10px;
    }

    .transcript-text {
      color: #ccc;
      font-size: 14px;
      line-height: 1.7;
    }

    .transcript-text .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: #E8A44A;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .transcripts {
      flex: 1;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.65;
      color: #ccc;
      scroll-behavior: smooth;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .transcripts::-webkit-scrollbar { display: none; }

    .transcripts:empty::after {
      content: 'Waiting for speech...';
      display: block;
      color: #555;
      font-style: italic;
      font-size: 12px;
      padding: 8px 0;
    }

    .transcript-entry {
      animation: messageIn 0.3s ease-out;
      padding: 6px 8px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 12.5px;
      line-height: 1.6;
      color: #e8e8e8;
    }

    @keyframes messageIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .connection-lost {
      color: #555;
      font-style: italic;
      font-size: 12px;
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <div class="overlay">

    <div class="titlebar" data-tauri-drag-region>
      <div class="titlebar-left">
        <img src="src/assets/star_freely.png" width="48" height="48" alt="" />
        <span>freely</span>
      </div>
      <div class="titlebar-right">
        <button id="panelMinBtn" aria-label="Minimize">—</button>
        <button id="panelCloseBtn" aria-label="Close">✕</button>
      </div>
    </div>

    <div class="body">
      <!-- Waveform -->
      <div class="waveform-row">
        <div class="dot"></div>
        <canvas id="waveform" width="75" height="32"></canvas>
      </div>

      <p class="listening-label">Listening...</p>

      <hr class="divider" />

      <!-- Transcript -->
      <p class="transcript-label">Transcript</p>
      <div id="transcripts" class="transcripts"></div>
    </div>

    <div class="resize-handle"></div>
  </div>

  <script type="module" src="src/panel.ts"></script>
</body>
</html>
