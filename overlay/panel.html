<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freely Panel</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="glass-panel">
      <header class="header" data-tauri-drag-region>
        <div class="header-left" data-tauri-drag-region>
          <svg class="header-logo" viewBox="0 0 18 18" fill="none">
            <path d="M9 1.5L10.3 7.7L16.5 9L10.3 10.3L9 16.5L7.7 10.3L1.5 9L7.7 7.7L9 1.5Z" fill="rgba(255,255,255,0.9)"/>
          </svg>
          <span class="header-title">freely</span>
          <span class="header-subtitle">listening</span>
        </div>
        <div class="header-actions">
          <button id="panelMinBtn" class="header-btn minimize" aria-label="Minimize">&minus;</button>
          <button id="panelCloseBtn" class="header-btn close" aria-label="Close">&times;</button>
        </div>
      </header>

      <div class="divider"></div>

      <div id="transcripts" class="transcripts"></div>
    </div>
    <script type="module" src="/src/panel.ts"></script>
  </body>
</html>
