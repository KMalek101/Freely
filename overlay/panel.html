<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freely Panel</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="glass-panel">
      <header class="header" data-tauri-drag-region>
        <div class="header-left" data-tauri-drag-region>
          <svg class="header-logo" viewBox="0 0 24 24" fill="none">
            <path
              d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"
              fill="var(--accent-orange)"
            />
          </svg>
          <span class="header-title">freely</span>
          <span class="header-subtitle">listening</span>
        </div>
        <div class="header-actions">
          <button
            id="panelMinBtn"
            class="header-btn minimize"
            aria-label="Minimize"
          >
            &minus;
          </button>
          <button
            id="panelCloseBtn"
            class="header-btn close"
            aria-label="Close"
          >
            &times;
          </button>
        </div>
      </header>

      <div class="divider"></div>

      <div id="transcripts" class="transcripts"></div>
    </div>
    <script type="module" src="/src/panel.ts"></script>
  </body>
</html>
