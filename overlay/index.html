<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freely</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="glass">
      <header class="header" data-tauri-drag-region>
        <div class="header-left" data-tauri-drag-region>
          <svg class="header-logo" viewBox="0 0 24 24" fill="none">
            <path
              d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"
              fill="var(--accent-orange)"
            />
          </svg>
          <span class="header-title">freely</span>
        </div>
        <div class="header-actions">
          <button id="minBtn" class="header-btn minimize" aria-label="Minimize">
            &minus;
          </button>
          <button id="closeBtn" class="header-btn close" aria-label="Close">
            &times;
          </button>
        </div>
      </header>

      <div class="divider"></div>

      <div id="loader" class="status-row">
        <div class="spinner"></div>
        <span class="status-text">Waiting for text&hellip;</span>
      </div>

      <div id="messages" class="messages"></div>

      <div class="divider"></div>

      <footer class="footer"></footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
