<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freely — Answer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent !important;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-user-select: none;
        user-select: none;
      }

      .overlay {
        width: 100vw;
        height: 100vh;
        background: rgba(30, 30, 30, 0.8);
        border-radius: 18px;
        border: 0.5px solid #2e2e2e;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .titlebar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 0.5px solid #2a2a2a;
        cursor: grab;
        -webkit-app-region: drag;
      }

      .titlebar-right {
        -webkit-app-region: no-drag;
      }

      .resize-handle {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 16px;
        height: 16px;
        cursor: se-resize;
        z-index: 10;
      }

      .resize-handle::after {
        content: '';
        position: absolute;
        right: 3px;
        bottom: 3px;
        width: 8px;
        height: 8px;
        border-right: 2px solid #555;
        border-bottom: 2px solid #555;
      }

      .titlebar-left {
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .titlebar-left span {
        color: #e8e8e8;
        font-size: 15px;
        font-weight: 500;
      }

      .titlebar-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .titlebar-right button {
        background: none;
        border: none;
        cursor: pointer;
        color: #555;
        font-size: 16px;
        line-height: 1;
        padding: 2px 5px;
        transition: color 0.15s;
      }

      .titlebar-right button:hover { color: #aaa; }

      .body {
        flex: 1;
        padding: 28px 26px 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        font-size: 9px;
        line-height: 1.5;
        color: #ccc;
        scroll-behavior: smooth;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .messages::-webkit-scrollbar { display: none; }

      .messages:empty { display: none; }

      .footer {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 10px 20px;
        border-top: 0.5px solid #2a2a2a;
        gap: 8px;
      }

      .copy-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        background: transparent;
        border: 0.5px solid #2a2a2a;
        color: #fff;
        font-size: 10px;
        font-family: inherit;
        padding: 4px 10px;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .copy-btn:hover {
        background: rgba(255,255,255,0.06);
      }

      .copy-btn.copied {
        border-color: rgba(76, 175, 80, 0.5);
        color: #76c77a;
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        text-align: center;
        height: 100%;
        min-height: 150px;
      }

      .empty-state img {
        width: 80px;
        height: 80px;
        opacity: 0.45;
        margin-bottom: 10px;
      }

      .empty-state .sub {
        color: #fff;
        font-size: 10px;
        line-height: 1.5;
        max-width: 200px;
        font-weight: 400;
        letter-spacing: 0.02em;
        opacity: 0.4;
      }

      .empty-state img {
        width: 80px;
        height: 40px;
        opacity: 0.5;
        margin-bottom: 20px;
        margin-left: -30px;
      }

      .empty-state .title {
        color: #fff;
        font-size: 9px;
        font-weight: 600;
        line-height: 1.4;
      }

      .empty-state .sub {
        color: #c4c4c4;
        font-size: 8px;
        line-height: 1.5;
        max-width: 220px;
        font-weight: 500;
      }

      .message-entry {
        animation: messageIn 0.3s ease-out;
        font-size: 9px;
        line-height: 1.5;
      }

      .message-entry p { margin: 0; display: inline; }
      .message-entry br { content: ''; display: block; margin: 0; }
      .message-entry code {
        background: rgba(255,255,255,0.06);
        padding: 1px 5px;
        border-radius: 4px;
        font-size: 9px;
      }
      .message-entry pre {
        background: rgba(0,0,0,0.3);
        padding: 8px;
        border-radius: 6px;
        overflow-x: auto;
        margin: 2px 0;
      }
      .message-entry pre code {
        background: none;
        padding: 0;
        font-size: 9px;
      }
      .message-entry ul, .message-entry ol {
        padding-left: 18px;
        margin: 2px 0;
        list-style: none;
      }
      .message-entry ul li, .message-entry ol li {
        position: relative;
        padding-left: 10px;
        margin: 0;
      }
      .message-entry ul li::before {
        content: '•';
        color: #E8A44A;
        position: absolute;
        left: -8px;
        font-size: 14px;
        line-height: 1.3;
      }
      .message-entry ol { counter-reset: list-counter; }
      .message-entry ol li { counter-increment: list-counter; }
      .message-entry ol li::before {
        content: counter(list-counter) '.';
        color: #E8A44A;
        position: absolute;
        left: -18px;
        font-size: 11px;
      }
      .message-entry strong { color: #E8A44A; }
      .message-entry a { color: #E8A44A; }
      .message-entry h1, .message-entry h2, .message-entry h3,
      .message-entry h4 { color: #E8A44A; margin: 2px 0; font-size: 10px; }

      @keyframes messageIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .connection-lost {
        color: #555;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <div class="titlebar" data-tauri-drag-region>
        <div class="titlebar-left">
          <img src="src/assets/star_freely.png" width="48" height="48" alt="" />
          <span>freely</span>
        </div>
        <div class="titlebar-right">
          <button id="minBtn" aria-label="Minimize">—</button>
          <button id="closeBtn" aria-label="Close">✕</button>
        </div>
      </div>

      <div class="body">
        <div id="messages" class="messages">
          <div class="empty-state" id="emptyState">
            <img src="src/assets/audio_orange.png" alt="" />
            <p class="title">Waiting for audio...</p>
            <p class="sub">Please check that your device audio is currently active</p>
          </div>
        </div>
      </div>
      <div class="footer">
        <button class="copy-btn" id="copyBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          Copy
        </button>
      </div>
      <div class="resize-handle"></div>
    </div>

    <script type="module">
      import { marked } from 'marked';

      document.addEventListener("DOMContentLoaded", () => {
        const tauri = window.__TAURI__;
        if (!tauri) return;
        const win = tauri.window.getCurrentWindow();

        document.getElementById("minBtn")?.addEventListener("click", () => win.minimize());
        document.getElementById("closeBtn")?.addEventListener("click", () => win.close());

        const handle = document.querySelector(".resize-handle");
        if (handle) {
          let dragging = false, sx, sy, sw, sh;
          handle.addEventListener("mousedown", (e) => {
            dragging = true;
            sx = e.clientX;
            sy = e.clientY;
            Promise.all([win.outerSize(), win.outerPosition()]).then(([size]) => {
              sw = size.width;
              sh = size.height;
            });
          });
          document.addEventListener("mousemove", (e) => {
            if (!dragging) return;
            const w = Math.max(200, sw + e.clientX - sx);
            const h = Math.max(200, sh + e.clientY - sy);
            win.setSize(new tauri.window.PhysicalSize(w, h));
          });
          document.addEventListener("mouseup", () => { dragging = false; });
        }

        const messages = document.getElementById("messages");
        if (!messages) return;
        const emptyState = document.getElementById("emptyState");

        let currentMsg = "";
        let currentEntry = null;

        function renderMessage() {
          if (!currentEntry) return;
          let html = marked.parse(currentMsg);
          html = html.replace(/<\/p>\s*<p>/g, '<br>').replace(/^<p>|<\/p>$/g, '');
          currentEntry.innerHTML = html;
          messages.scrollTop = messages.scrollHeight;
        }

        function startMessage() {
          currentMsg = "";
          currentEntry = document.createElement("div");
          currentEntry.className = "message-entry";
          if (emptyState && emptyState.parentNode) emptyState.remove();
          messages.appendChild(currentEntry);
        }

        function finishMessage() {
          if (!currentEntry) return;
          renderMessage();
          currentMsg = "";
          currentEntry = null;
        }

        const eventSource = new EventSource("http://localhost:3001/events");

        eventSource.onmessage = (event) => {
          let data;
          try {
            data = JSON.parse(event.data);
          } catch {
            return;
          }

          if (data.type === "ai-chunk") {
            if (!currentEntry) startMessage();
            currentMsg += data.content;
            renderMessage();
          } else if (data.type === "ai-done") {
            finishMessage();
          }
        };

        eventSource.onerror = () => {
          if (currentEntry) {
            currentMsg = "[Connection lost]";
            startMessage();
            renderMessage();
            finishMessage();
          }
        };

        const copyBtn = document.getElementById("copyBtn");
        if (copyBtn) {
          copyBtn.addEventListener("click", async () => {
            const entries = messages.querySelectorAll(".message-entry");
            if (!entries.length) return;
            const text = Array.from(entries).map(e => e.textContent).join("\n\n");
            try {
              await navigator.clipboard.writeText(text);
              const orig = copyBtn.innerHTML;
              copyBtn.classList.add("copied");
              copyBtn.innerHTML = `
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Copied
              `;
              setTimeout(() => {
                copyBtn.classList.remove("copied");
                copyBtn.innerHTML = orig;
              }, 2000);
            } catch {}
          });
        }
      });
    </script>
  </body>
</html>
